<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Leis e Decretos - COLÔNIAPREV</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='assets/css/style.css') }}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f4f6fa; }
        .container-header { background: #fff; padding: 20px; text-align: center; border-bottom: 2px solid #e63946; }
        .container-header h1 { color: #e63946; margin: 0; }
        .content { max-width: 1000px; margin: 30px auto; background: #fff; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .doc-list { list-style: none; padding: 0; display: grid; gap: 15px; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); }
        .doc-item { padding: 20px; border: 1px solid #eee; border-radius: 8px; transition: 0.3s; display: flex; flex-direction: column; justify-content: space-between; }
        .doc-item:hover { border-color: #e63946; box-shadow: 0 4px 15px rgba(230,57,70,0.1); transform: translateY(-3px); }
        .doc-title { font-weight: bold; font-size: 16px; margin-bottom: 10px; color: #333; }
        .doc-type { font-size: 12px; background: #f4f6fa; padding: 5px 10px; border-radius: 15px; display: inline-block; color: #555; margin-bottom: 15px; }
        .btn-download { background: #0056b3; color: #fff; padding: 10px; border-radius: 5px; text-decoration: none; text-align: center; font-size: 14px; transition: 0.3s; }
        .btn-download:hover { background: #004494; }
        .btn-voltar { display: inline-block; margin-top: 20px; color: #0056b3; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container-header">
        <h1>Leis e Decretos</h1>
        <p>Documentos Oficiais</p>
    </div>
    <div class="content">
        <ul class="doc-list">
            {% for lei in leis %}
            <li class="doc-item">
                <div>
                    <div class="doc-type"><i class="bi bi-tag"></i> {{ lei.tipo }}</div>
                    <div class="doc-title">{{ lei.titulo }}</div>
                    <small style="color: #888; display: block; margin-bottom: 15px;">Publicado em: {{ lei.data_publicacao.strftime('%d/%m/%Y') }}</small>
                </div>
                <a href="{{ url_for('public.download_lei', lei_id=lei.id) }}" class="btn-download"><i class="bi bi-download"></i> Baixar PDF</a>
            </li>
            {% else %}
            <li style="grid-column: 1 / -1; text-align: center; padding: 30px; color: #777;">Nenhuma lei ou decreto publicado no momento.</li>
            {% endfor %}
        </ul>

        <a href="{{ url_for('public.index') }}" class="btn-voltar"><i class="bi bi-arrow-left"></i> Voltar ao Início</a>
    </div>
</body>
</html>
