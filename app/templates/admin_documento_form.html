{% extends "admin_base.html" %}
{% block title %}Novo Documento{% endblock %}

{% block content %}
<div class="admin-card">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h3 style="margin: 0;">Fazer Upload de Documento</h3>
        <a href="{{ url_for('admin.documentos') }}" class="btn-action" style="color: #0056b3;"><i class="bi bi-arrow-left"></i> Voltar</a>
    </div>
    
    <form method="POST" enctype="multipart/form-data" style="max-width: 500px;">
        <div style="margin-bottom: 15px;">
            <label style="display: block; margin-bottom: 5px; font-weight: bold;">Título do Documento</label>
            <input type="text" name="titulo" required placeholder="Ex: Contracheque Jan/2023" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px;">
        </div>
        <div style="margin-bottom: 15px;">
            <label style="display: block; margin-bottom: 5px; font-weight: bold;">Tipo/Categoria</label>
            <select name="tipo" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px;">
                <option value="contracheque">Contracheque</option>
                <option value="informe">Informe de Rendimentos</option>
                <option value="notificacao">Notificação/Aviso</option>
                <option value="outro">Outro Documento</option>
            </select>
        </div>
        <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 5px; font-weight: bold;">Arquivo PDF</label>
            <input type="file" name="arquivo" accept=".pdf" required style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px;">
        </div>
        
        <button type="submit" class="btn-add"><i class="bi bi-upload"></i> Salvar e Fazer Upload</button>
    </form>
</div>
{% endblock %}
