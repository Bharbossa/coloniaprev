{% extends "admin_base.html" %}
{% block title %}{{ 'Editar' if servidor else 'Novo' }} Servidor{% endblock %}

{% block content %}
<div class="admin-card">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h3 style="margin: 0;">{{ 'Editar' if servidor else 'Novo' }} Servidor</h3>
        <a href="{{ url_for('admin.servidores') }}" class="btn-action" style="color: #0056b3;"><i class="bi bi-arrow-left"></i> Voltar</a>
    </div>
    
    <form method="POST" style="max-width: 500px;">
        <div style="margin-bottom: 15px;">
            <label style="display: block; margin-bottom: 5px; font-weight: bold;">Nome Completo</label>
            <input type="text" name="nome" value="{{ servidor.nome if servidor else '' }}" required style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px;">
        </div>
        <div style="margin-bottom: 15px;">
            <label style="display: block; margin-bottom: 5px; font-weight: bold;">Cargo</label>
            <input type="text" name="cargo" value="{{ servidor.cargo if servidor else '' }}" required style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px;">
        </div>
        <div style="margin-bottom: 15px;">
            <label style="display: block; margin-bottom: 5px; font-weight: bold;">Tipo</label>
            <select name="tipo" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px;">
                <option value="ativo" {% if servidor and servidor.tipo == 'ativo' %}selected{% endif %}>Ativo</option>
                <option value="aposentado" {% if servidor and servidor.tipo == 'aposentado' %}selected{% endif %}>Aposentado</option>
                <option value="pensionista" {% if servidor and servidor.tipo == 'pensionista' %}selected{% endif %}>Pensionista</option>
            </select>
        </div>
        <div style="margin-bottom: 15px;">
            <label style="display: block; margin-bottom: 5px; font-weight: bold;">Situação</label>
            <select name="situacao" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px;">
                <option value="ativo" {% if servidor and servidor.situacao == 'ativo' %}selected{% endif %}>Ativo</option>
                <option value="afastado" {% if servidor and servidor.situacao == 'afastado' %}selected{% endif %}>Afastado</option>
                <option value="inativo" {% if servidor and servidor.situacao == 'inativo' %}selected{% endif %}>Inativo</option>
            </select>
        </div>
        <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 5px; font-weight: bold;">Salário Bruto (R$)</label>
            <input type="number" step="0.01" name="salario" value="{{ servidor.salario if servidor else '0.00' }}" required style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px;">
        </div>
        <button type="submit" class="btn-add"><i class="bi bi-check-circle"></i> Salvar Servidor</button>
    </form>
</div>
{% endblock %}
