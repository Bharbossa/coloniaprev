{% extends "admin_base.html" %}
{% block title %}Nova Publicação Oficial{% endblock %}

{% block content %}
<div class="admin-card">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h3 style="margin: 0;">Fazer Upload de Lei/Decreto</h3>
        <a href="{{ url_for('admin.leis') }}" class="btn-action" style="color: #0056b3;"><i class="bi bi-arrow-left"></i> Voltar</a>
    </div>
    
    <form method="POST" enctype="multipart/form-data" style="max-width: 500px;">
        <div style="margin-bottom: 15px;">
            <label style="display: block; margin-bottom: 5px; font-weight: bold;">Título do Documento</label>
            <input type="text" name="titulo" required placeholder="Ex: Lei Complementar nº 100/2023" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px;">
        </div>
        <div style="margin-bottom: 15px;">
            <label style="display: block; margin-bottom: 5px; font-weight: bold;">Tipo de Publicação</label>
            <select name="tipo" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px;">
                <option value="Lei">Lei</option>
                <option value="Decreto">Decreto</option>
                <option value="Portaria">Portaria</option>
                <option value="Edital">Edital</option>
                <option value="Resolução">Resolução</option>
            </select>
        </div>
        <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 5px; font-weight: bold;">Arquivo PDF</label>
            <input type="file" name="arquivo" accept=".pdf" required style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px;">
        </div>
        
        <button type="submit" class="btn-add"><i class="bi bi-upload"></i> Salvar e Publicar</button>
    </form>
</div>
{% endblock %}
