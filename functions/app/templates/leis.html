<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Leis e Decretos - COLÔNIAPREV</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='assets/css/style.css') }}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f4f6fa; margin: 0; padding: 0; position: relative; min-height: 100vh; }
        
        /* Marca D'água da Logo */
        body::before {
            content: "";
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60vw;
            height: 60vw;
            max-width: 700px;
            max-height: 700px;
            background-image: url("{{ url_for('static', filename='assets/img/mosaico-prev.png') }}");
            background-repeat: no-repeat;
            background-position: center;
            background-size: contain;
            opacity: 0.6;
            z-index: 0;
            pointer-events: none;
        }

        .container-header { 
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.15); 
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            padding: 20px; 
            text-align: center; 
            border-bottom: 1px solid rgba(255,255,255,0.1); 
            border-top: 1px solid rgba(255, 255, 255, 0.8);
            border-left: 1px solid rgba(255, 255, 255, 0.5);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 15px 35px rgba(0,0,0,0.15), inset 0 0 15px rgba(255,255,255,0.1);
            overflow: hidden;
        }
        .container-header::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 50%;
            background: linear-gradient(to bottom, rgba(255,255,255,0.25) 0%, rgba(255,255,255,0) 100%);
            pointer-events: none; z-index: 0;
        }
        .container-header > * { position: relative; z-index: 1; }

        .container-header h1 { color: #e63946; margin: 0; text-shadow: 0 1px 2px rgba(255,255,255,0.8); }
        .content { 
            position: relative;
            z-index: 1;
            max-width: 1000px; 
            margin: 30px auto; 
            background: rgba(255, 255, 255, 0.15); 
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            padding: 30px; 
            border-radius: 12px; 
            border-top: 1px solid rgba(255, 255, 255, 0.8);
            border-left: 1px solid rgba(255, 255, 255, 0.5);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 15px 35px rgba(0,0,0,0.15), inset 0 0 15px rgba(255,255,255,0.1);
            overflow: hidden;
        }
        .content::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 30%;
            background: linear-gradient(to bottom, rgba(255,255,255,0.2) 0%, rgba(255,255,255,0) 100%);
            pointer-events: none; z-index: 0;
            border-radius: 12px 12px 0 0;
        }
        .content > * { position: relative; z-index: 1; }

        .doc-list { list-style: none; padding: 0; display: grid; gap: 20px; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); }
        .doc-item { 
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(4px);
            padding: 25px; 
            border-top: 1px solid rgba(255, 255, 255, 0.9);
            border-left: 1px solid rgba(255, 255, 255, 0.6);
            border-right: 1px solid rgba(255, 255, 255, 0.2);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px; 
            transition: all 0.3s ease; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1), inset 0 0 10px rgba(255,255,255,0.2);
            position: relative;
            overflow: hidden;
        }
        .doc-item::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 50%;
            background: linear-gradient(to bottom, rgba(255,255,255,0.3) 0%, rgba(255,255,255,0) 100%);
            pointer-events: none; z-index: 0;
            border-radius: 10px 10px 0 0;
        }
        .doc-item > * { position: relative; z-index: 1; }
        .doc-item:hover { border-color: rgba(230,57,70,0.5); box-shadow: 0 12px 30px rgba(230,57,70,0.2), inset 0 0 15px rgba(255,255,255,0.3); transform: translateY(-5px); }
        .doc-title { font-weight: bold; font-size: 16px; margin-bottom: 10px; color: #333; }
        .doc-type { font-size: 12px; background: #f4f6fa; padding: 5px 10px; border-radius: 15px; display: inline-block; color: #555; margin-bottom: 15px; }
        .btn-download { background: #0056b3; color: #fff; padding: 10px; border-radius: 5px; text-decoration: none; text-align: center; font-size: 14px; transition: 0.3s; }
        .btn-download:hover { background: #004494; }
        .btn-voltar { display: inline-block; margin-top: 20px; color: #0056b3; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div style="display: flex; flex-direction: column; width: 100%; min-height: 100vh; background: #f4f6fa; justify-content: flex-start;">
        <div class="container-header">
            <h1>Leis e Decretos</h1>
            <p>Documentos Oficiais</p>
        </div>
        <div class="content" style="width: 100%; box-sizing: border-box;">
            <ul class="doc-list">
                {% for lei in leis %}
                <li class="doc-item">
                    <div>
                        <div class="doc-type"><i class="bi bi-tag"></i> {{ lei.tipo }}</div>
                        <div class="doc-title">{{ lei.titulo }}</div>
                        <small style="color: #888; display: block; margin-bottom: 15px;">Publicado em: {{ lei.data_publicacao.strftime('%d/%m/%Y') }}</small>
                    </div>
                    <div style="display: flex; gap: 10px;">
                        <a href="{{ url_for('public.visualizar_lei', lei_id=lei.id) }}" target="_blank" class="btn-download" style="flex: 1; background: #17a2b8;"><i class="bi bi-eye"></i> Visualizar</a>
                        <a href="{{ url_for('public.download_lei', lei_id=lei.id) }}" class="btn-download" style="flex: 1;"><i class="bi bi-download"></i> Baixar</a>
                    </div>
                </li>
                {% else %}
                <li style="grid-column: 1 / -1; text-align: center; padding: 30px; color: #777;">Nenhuma lei ou decreto publicado no momento.</li>
                {% endfor %}
            </ul>

            <a href="{{ url_for('public.index') }}" class="btn-voltar"><i class="bi bi-arrow-left"></i> Voltar ao Início</a>
        </div>
    </div>
</body>
</html>
