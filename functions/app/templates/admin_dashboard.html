{% extends "admin_base.html" %}
{% block title %}Dashboard{% endblock %}
{% block head %}
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
    .cards-row { display: flex; gap: 20px; margin-bottom: 30px; }
    .card { flex: 1; background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); display: flex; align-items: center; gap: 20px; }
    .card-icon { font-size: 40px; color: #0056b3; }
    .card-info h3 { margin: 0; color: #777; font-size: 14px; }
    .card-info h2 { margin: 5px 0 0 0; color: #333; font-size: 28px; }
</style>
{% endblock %}

{% block content %}
<div class="cards-row">
    <div class="card">
        <div class="card-icon"><i class="bi bi-people"></i></div>
        <div class="card-info">
            <h3>Usuários Registrados</h3>
            <h2>{{ total_usuarios }}</h2>
        </div>
    </div>
    <div class="card">
        <div class="card-icon" style="color: #f57c00;"><i class="bi bi-bank"></i></div>
        <div class="card-info">
            <h3>Leis / Decretos</h3>
            <h2>{{ total_leis }}</h2>
        </div>
    </div>
</div>

<div class="admin-card">
    <h3 style="margin-top: 0;">Distribuição de Documentos</h3>
    <canvas id="docsChart" width="400" height="150"></canvas>
</div>

<script>
    const ctx = document.getElementById('docsChart').getContext('2d');
    const labels = JSON.parse('{{ chart_labels | tojson | safe }}');
    const data = JSON.parse('{{ chart_data | tojson | safe }}');

    const docsChart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: labels.length > 0 ? labels : ['Vazio'],
            datasets: [{
                label: 'Quantidade de Documentos',
                data: data.length > 0 ? data : [0],
                backgroundColor: '#0056b3',
                borderRadius: 5,
            }]
        },
        options: {
            responsive: true,
            scales: {
                y: { beginAtZero: true }
            }
        }
    });
</script>
{% endblock %}
